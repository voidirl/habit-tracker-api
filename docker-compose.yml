services:
  db:
    image: postgres:16-alpine
    container_name: habittracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: habituser
      POSTGRES_PASSWORD: habitpass
      POSTGRES_DB: habittracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habituser -d habittracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: habittracker_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app

volumes:
  pgdata: